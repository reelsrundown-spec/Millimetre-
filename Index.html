<!DOCTYPE html>
<html>
<head>
    <title>Vector Runner - Landscape</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <style>
        /* Landscape Mode Optimization */
        body { 
            margin: 0; 
            background: #000; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: row; /* Buttons side-il വരാൻ */
        }

        #gameArea { 
            flex: 1; 
            background: linear-gradient(#1e3c72, #2a5298); 
            position: relative; 
            height: 100vh;
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        /* Controls side-il set ചെയ്യുന്നു */
        .controls { 
            width: 120px; 
            background: #111; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            align-items: center; 
            padding: 10px;
            border-left: 4px solid #444;
        }

        .btn { 
            width: 90px; 
            height: 70px; 
            background: #333; 
            color: #fff; 
            border-radius: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: sans-serif; 
            font-weight: bold; 
            font-size: 14px;
            user-select: none; 
            touch-action: manipulation; 
            border: 3px solid #555; 
        }

        .action-btn { background: #e74c3c; border-color: #c0392b; }
        .btn:active { transform: scale(0.9); background: #666; }

        /* ഫോൺ ലാൻഡ്‌സ്‌കേപ്പ് അല്ലെങ്കിൽ മെസ്സേജ് കാണിക്കാൻ */
        @media screen and (orientation: portrait) {
            #gameArea::after {
                content: "Please rotate your phone to Landscape Mode";
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background: #000; color: #fff;
                display: flex; justify-content: center; align-items: center;
                z-index: 10;
            }
        }
    </style>
</head>
<body>
    <div id="gameArea"><canvas id="gameCanvas"></canvas></div>
    <div class="controls">
        <div class="btn action-btn" id="jumpBtn">JUMP</div>
        <div class="btn" id="leftBtn">LEFT</div>
        <div class="btn" id="rightBtn">RIGHT</div>
        <div class="btn action-btn" id="slideBtn">SLIDE</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() { 
            canvas.width = canvas.offsetWidth; 
            canvas.height = canvas.offsetHeight; 
        }
        window.addEventListener('resize', resize); 
        resize();

        let player = {
            x: 100,
            y: 0,
            speed: 0,
            action: "idle",
            jumpY: 0,
            isJumping: false,
            dir: 1
        };

        const handleBtn = (id, startAction, endAction) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); startAction(); };
            const end = (e) => { e.preventDefault(); if(endAction) endAction(); };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
        };

        handleBtn('leftBtn', () => { player.speed = -6; player.action="run"; player.dir = -1; });
        handleBtn('rightBtn', () => { player.speed = 6; player.action="run"; player.dir = 1; });
        handleBtn('jumpBtn', () => { 
            if(!player.isJumping) {
                player.isJumping = true;
                player.action = "jump";
                let v = 15;
                let g = 0.8;
                let currentJump = 0;
                let jumpTimer = setInterval(() => {
                    player.jumpY += v;
                    v -= g;
                    if(player.jumpY <= 0) {
                        player.jumpY = 0; player.isJumping = false; player.action = "idle";
                        clearInterval(jumpTimer);
                    }
                }, 20);
            }
        });
        handleBtn('slideBtn', () => { player.action = "slide"; setTimeout(() => player.action = "idle", 600); });

        const stopMove = () => { player.speed = 0; if(!player.isJumping) player.action = "idle"; };
        document.getElementById('leftBtn').addEventListener('touchend', stopMove);
        document.getElementById('rightBtn').addEventListener('touchend', stopMove);

        function drawPlayer(ctx, x, y, action, d) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(d, 1);
            ctx.fillStyle = "black";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 12;
            ctx.lineCap = "round";

            // Head (Vector style)
            ctx.beginPath(); ctx.arc(0, -90, 18, 0, Math.PI * 2); ctx.fill();
            // Body
            ctx.beginPath(); ctx.moveTo(0, -75); ctx.lineTo(0, -30);
            
            if(action === "run") {
                let move = Math.sin(Date.now() * 0.012) * 25;
                ctx.moveTo(0, -30); ctx.lineTo(move, 15);
                ctx.moveTo(0, -30); ctx.lineTo(-move, 15);
                ctx.moveTo(0, -65); ctx.lineTo(-move/2, -40);
            } else if(action === "slide") {
                ctx.moveTo(0, -30); ctx.lineTo(40, 15);
                ctx.moveTo(0, -65); ctx.lineTo(-25, -35);
            } else if(action === "jump") {
                ctx.moveTo(0, -30); ctx.lineTo(-10, 5);
                ctx.moveTo(0, -30); ctx.lineTo(10, 5);
                ctx.moveTo(0, -65); ctx.lineTo(20, -80);
            } else {
                ctx.moveTo(0, -30); ctx.lineTo(-15, 15);
                ctx.moveTo(0, -30); ctx.lineTo(15, 15);
            }
            ctx.stroke();
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const groundY = canvas.height - 60;
            
            // Background elements (optional)
            ctx.fillStyle = "#222";
            ctx.fillRect(0, groundY, canvas.width, 60);

            player.x += player.speed;
            
            // Screen boundary check
            if(player.x < 30) player.x = 30;
            if(player.x > canvas.width - 30) player.x = canvas.width - 30;

            drawPlayer(ctx, player.x, groundY - player.jumpY, player.action, player.dir);

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
