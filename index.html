<!DOCTYPE html>
<html>
<head>
    <title>S&L Pro - Install</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { 
            background: #1a1a1a; color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        .install-btn {
            background: #f1c40f; color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; border: none; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <img src="icon.png" width="100" style="border-radius: 20px; margin-bottom: 20px;">
    <h2>Snake & Ladder Pro AI</h2>
    <p>Install the game to your home screen</p>
    <button class="install-btn" id="installBtn">INSTALL APP</button>
    <p><a href="loading.html" style="color: #f1c40f; text-decoration: none;">Or Play in Browser</a></p>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Install logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            } else {
                window.location.href = "loading.html";
            }
        });
    </script>
</body>
</html>
