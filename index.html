<!DOCTYPE html>
<html>
<head>
    <title>S&L Pro - Install</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .install-btn { background: #f1c40f; color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; border: none; font-size: 18px; cursor: pointer; margin-top: 10px; }
        a { color: #f1c40f; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <img src="icon.png" width="100" style="border-radius: 20px; margin-bottom: 10px;">
    <h2>Snake & Ladder Pro AI</h2>
    <button class="install-btn" id="installBtn">INSTALL APP</button>
    <br>
    <a href="game/loading.html">PLAY IN BROWSER</a>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            } else {
                window.location.href = "game/loading.html";
            }
        });
    </script>
</body>
</html>
