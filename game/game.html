<!DOCTYPE html>
<html>
<head>
    <title>Snake & Ladder</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        #board { 
            display: grid; 
            grid-template-columns: repeat(10, 35px); 
            grid-template-rows: repeat(10, 35px); 
            gap: 2px; 
            margin: 20px auto; 
            width: fit-content;
            border: 5px solid #333;
        }
        .cell { 
            width: 35px; height: 35px; 
            background: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; border: 1px solid #ddd; position: relative;
        }
        .player { 
            width: 20px; height: 20px; border-radius: 50%; 
            position: absolute; transition: all 0.3s; z-index: 10;
        }
        #p1 { background: red; border: 2px solid black; }
        #dice-btn { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Snake & Ladder</h2>
    <div id="status">Your Turn!</div>
    <div id="board"></div>
    <button id="dice-btn" onclick="rollDice()">Roll Dice 🎲</button>
    <p id="roll-val"></p>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        let pos = 1;

        // Ladders and Snakes
        const portals = { 3: 22, 5: 8, 11: 26, 20: 29, 27: 1, 21: 9, 17: 4, 19: 7 };

        // Create Board
        for (let i = 100; i >= 1; i--) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.id = 'cell-' + i;
            div.innerText = i;
            board.appendChild(div);
        }

        // Create Player
        const p1 = document.createElement('div');
        p1.className = 'player';
        p1.id = 'p1';
        document.getElementById('cell-1').appendChild(p1);

        function rollDice() {
            let die = Math.floor(Math.random() * 6) + 1;
            document.getElementById('roll-val').innerText = "You rolled: " + die;
            
            let nextPos = pos + die;
            if (nextPos <= 100) {
                pos = nextPos;
                if (portals[pos]) {
                    status.innerText = portals[pos] > pos ? "Ladder! 🪜" : "Snake! 🐍";
                    pos = portals[pos];
                } else {
                    status.innerText = "Keep going!";
                }
                movePlayer(pos);
            }
            
            if (pos === 100) {
                status.innerText = "Victory! 🏆";
                document.getElementById('dice-btn').disabled = true;
            }
        }

        function movePlayer(p) {
            document.getElementById('cell-' + p).appendChild(p1);
        }
    </script>
</body>
</html>
