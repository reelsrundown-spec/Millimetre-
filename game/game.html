<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3 id="status">Your Turn</h3>
    <div id="board"></div>
    
    <div style="margin-top:20px;">
        <button id="roll-btn" class="btn" onclick="playGame()">ROLL DICE 🎲</button>
        <p id="dice-result">Roll the dice!</p>
    </div>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        const diceRes = document.getElementById('dice-result');
        
        let p1Pos = 1, p2Pos = 1; // p1: You, p2: AI
        const portals = { 3: 22, 5: 8, 11: 26, 20: 29, 27: 1, 21: 9, 17: 4, 19: 7, 99: 5, 50: 10 };

        // Create Zig-Zag Board
        for (let r = 9; r >= 0; r--) {
            for (let c = (r % 2 == 0 ? 0 : 9); (r % 2 == 0 ? c <= 9 : c >= 0); (r % 2 == 0 ? c++ : c--)) {
                let val = r * 10 + c + 1;
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + val;
                cell.innerText = val;
                board.appendChild(cell);
            }
        }

        // Add Players
        const p1 = document.createElement('div'); p1.className = 'player'; p1.style.background = 'red';
        const p2 = document.createElement('div'); p2.className = 'player'; p2.style.background = 'blue';

        function move() {
            document.getElementById('cell-' + p1Pos).appendChild(p1);
            document.getElementById('cell-' + p2Pos).appendChild(p2);
        }
        move();

        async function playGame() {
            document.getElementById('roll-btn').disabled = true;
            
            // Your Turn
            let roll = Math.floor(Math.random() * 6) + 1;
            diceRes.innerText = "You rolled: " + roll;
            p1Pos = checkPos(p1Pos + roll, "You");
            move();
            if (p1Pos >= 100) return alert("YOU WON!");

            // AI Turn
            status.innerText = "AI is rolling...";
            await new Promise(res => setTimeout(res, 1000));
            let aiRoll = Math.floor(Math.random() * 6) + 1;
            diceRes.innerText = "AI rolled: " + aiRoll;
            p2Pos = checkPos(p2Pos + aiRoll, "AI");
            move();
            if (p2Pos >= 100) return alert("AI WON!");

            status.innerText = "Your Turn";
            document.getElementById('roll-btn').disabled = false;
        }

        function checkPos(pos, who) {
            if (pos > 100) return pos - (pos - 100); 
            if (portals[pos]) {
                status.innerText = who + (portals[pos] > pos ? " climbed a Ladder!" : " hit a Snake!");
                return portals[pos];
            }
            return pos;
        }
    </script>
</body>
</html>
